name: Sync Fork

on:
  schedule:
    - cron: '0 * * * *'  # Jede Stunde prüfen
  workflow_dispatch:       # Auch manuell auslösbar

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote add upstream https://github.com/matveysiva/european-impact-sprint-prototype.git
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories -X theirs
          git push
